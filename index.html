<!DOCTYPE html>
<html>
<head>
  <title>Mapping MNR</title>
  <meta charset="utf-8" />
 // =========================
// API PETA
// =========================
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.control.layers.tree/L.Control.Layers.Tree.css"/>

  <style>
    body { margin:0; font-family:Arial; }

    #title {
      padding:12px;
      background:#2c3e50;
      color:white;
      text-align:center;
      font-weight:bold;
    }

    #map {
      height: calc(100vh - 50px);
    }

    .legend-color {
      display:inline-block;
      width:12px;
      height:12px;
      margin-right:6px;
      border-radius:50%;
      border:1px solid #333;
    }
  </style>
</head>
<body>

<div id="title">Mapping MNR</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://unpkg.com/leaflet.control.layers.tree/L.Control.Layers.Tree.js"></script>

<script>

var map = L.map('map').setView([-7.8,112],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// =========================
// COLOR GENERATOR
// =========================
const colorIndex = {};
let currentIndex = 0;

function getColor(key){
  if(!key || key==="VACANT") return "black";

  if(colorIndex[key] !== undefined){
    return `hsl(${colorIndex[key]}, 70%, 50%)`;
  }

  const hue = (currentIndex * 137.508) % 360; // golden angle
  colorIndex[key] = hue;
  currentIndex++;

  return `hsl(${hue}, 70%, 50%)`;
}

// =========================
// LOAD DATA (API Appscript)
// =========================
fetch("https://script.google.com/macros/s/AKfycbwfLtLF5Yd7grYt8Pc-N6FQywHZkw16tGKCm0uauFENlSrFvXspeeUyKgUAzbsCyt4/exec")
.then(res=>res.json())
.then(data=>{

  const mpGroups = {};
  const teknisiGroups = {};
  const spvGroups = {};

  // GROUPING
  data.features.forEach(f=>{
    const mp = f.properties["NAMA MP"];
    const teknisi = f.properties["NAMA TEKNISI"];
    const spv = f.properties["NAMA SUPERVISOR M&R"];

    if(!mpGroups[mp]) mpGroups[mp]=[];
    mpGroups[mp].push(f);

    if(teknisi && teknisi!=="VACANT"){
      if(!teknisiGroups[teknisi]) teknisiGroups[teknisi]=[];
      teknisiGroups[teknisi].push(f);
    }

    if(spv && spv!=="VACANT"){
      if(!spvGroups[spv]) spvGroups[spv]=[];
      spvGroups[spv].push(f);
    }
  });

  // =========================
  // MP POINT
  // =========================
  const mpChildren = [];

  Object.keys(mpGroups).forEach(mp=>{

    const color = getColor(mp);

    const layer = L.geoJSON(mpGroups[mp],{
      pointToLayer:(f,latlng)=>{
        return L.circleMarker(latlng,{
          radius:8,
          fillColor:color,
          color:"#000",
          weight:1,
          fillOpacity:0.9
        });
      },
      onEachFeature:(f,l)=>{
        l.bindPopup(`
          <b>${f.properties["NAMA STORE"]}</b><br>
          MP: ${f.properties["NAMA MP"]}<br>
          Teknisi: ${f.properties["NAMA TEKNISI"]}<br>
          SPV: ${f.properties["NAMA SUPERVISOR M&R"]}
        `);
          // TOOLTIP selalu tampil
        l.bindTooltip(
          f.properties["NAMA STORE"],
          {
            permanent: false,
            direction: "top",
            offset: [0, -10],
            className: "label-store"
          }
        );
      }
    }).addTo(map);

    mpChildren.push({
      label:`<span class="legend-color" style="background:${color}"></span>${mp}`,
      layer
    });

  });

  // =========================
  // TEKNISI POLYGON
  // =========================
  const teknisiChildren = [];

  Object.keys(teknisiGroups).forEach(t=>{

    if(teknisiGroups[t].length<3) return;

    const color = getColor(t);

    const hull = turf.convex({
      type:"FeatureCollection",
      features:teknisiGroups[t]
    });

    if(!hull) return;

    const layer = L.geoJSON(hull,{
      interactive:false,
      style:{
        color:color,
        fillColor:color,
        fillOpacity:0.22,
        weight:1.5
      }
    }).addTo(map);

    teknisiChildren.push({
      label:`<span class="legend-color" style="background:${color}"></span>${t}`,
      layer
    });

  });

  // =========================
  // SPV POLYGON
  // =========================
  const spvChildren = [];

  Object.keys(spvGroups).forEach(s=>{

    if(spvGroups[s].length<3) return;

    const color = getColor(s);

    const hull = turf.convex({
      type:"FeatureCollection",
      features:spvGroups[s]
    });

    if(!hull) return;

    const layer = L.geoJSON(hull,{
      interactive:false,
      style:{
        color:color,
        fillColor:color,
        fillOpacity:0.16,
        weight:1.5
      }
    }).addTo(map);

    spvChildren.push({
      label:`<span class="legend-color" style="background:${color}"></span>${s}`,
      layer
    });

  });

  // =========================
  // TREE CONTROL
  // =========================
  const tree = {
    label:"Layer Control",
    children:[
      { label:"MP", selectAllCheckbox:true, children:mpChildren },
      { label:"Area Teknisi", selectAllCheckbox:true, children:teknisiChildren },
      { label:"Area SPV", selectAllCheckbox:true, children:spvChildren }
    ]
  };

  L.control.layers.tree(null, tree, {
    collapsed:false
  }).addTo(map);

});

</script>

</body>
</html>
