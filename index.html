<!DOCTYPE html>
<html>
<head>
  <title>Map Manpower</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map {
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // =========================
  // INIT MAP
  // =========================
  var map = L.map('map').setView([-7.8, 112.0], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);


  // =========================
  // COLOR SYSTEM (AUTO MP)
  // =========================
  const mpColors = {};

  function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 75%, 50%)`;
  }

  function getColor(mp) {
    if (!mp || mp === "VACANT") {
      return "black";
    }

    if (!mpColors[mp]) {
      mpColors[mp] = stringToColor(mp);
    }

    return mpColors[mp];
  }


  // =========================
  // LOAD DATA (GANTI URL)
  // =========================
  fetch("https://script.google.com/macros/s/AKfycbzjGd2pLlx_jP4MpxqWUy0YEUYKI725VMUr5jKNymtVj0eyr112614DELiHM0GqZMkH/exec")
    .then(response => response.json())
    .then(data => {

      const layer = L.geoJSON(data, {

        pointToLayer: function(feature, latlng) {
          return L.circleMarker(latlng, {
            radius: 8,
            fillColor: getColor(feature.properties["NAMA MP"]),
            color: "#000",
            weight: 1,
            fillOpacity: 0.85
          });
        },

        onEachFeature: function(feature, layer) {
          layer.bindPopup(`
            <b>${feature.properties["NAMA STORE"]}</b><br>
            MP: ${feature.properties["NAMA MP"]}<br>
            Teknisi: ${feature.properties["NAMA TEKNISI"]}<br>
            Supervisor: ${feature.properties["NAMA SUPERVISOR M&R"]}
          `);
        }

      }).addTo(map);

      // AUTO ZOOM ke semua titik
      map.fitBounds(layer.getBounds());

    })
    .catch(err => {
      console.error("Error load data:", err);
      alert("Gagal load data. Cek URL API kamu.");
    });

</script>

</body>
</html>
