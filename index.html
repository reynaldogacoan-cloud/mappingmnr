<!DOCTYPE html>
<html>
<head>
  <title>Mapping MNR</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.control.layers.tree/L.Control.Layers.Tree.css"/>

  <style>
    body { margin:0; font-family:Arial; }

    #title {
      padding:12px;
      background:#2c3e50;
      color:white;
      text-align:center;
      font-weight:bold;
    }

    #map {
      height: calc(100vh - 50px);
    }
  </style>
</head>
<body>

<div id="title">Mapping MNR</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://unpkg.com/leaflet.control.layers.tree/L.Control.Layers.Tree.js"></script>

<script>

var map = L.map('map').setView([-7.8,112],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// =========================
// COLOR MP
// =========================
const mpColors = {};

function stringToColor(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    hash=str.charCodeAt(i)+((hash<<5)-hash);
  }
  return `hsl(${Math.abs(hash)%360},75%,50%)`;
}

function getColor(mp){
  if(!mp || mp==="VACANT") return "black";
  if(!mpColors[mp]) mpColors[mp]=stringToColor(mp);
  return mpColors[mp];
}

// =========================
// LOAD DATA
// =========================
fetch("https://script.google.com/macros/s/AKfycbzjGd2pLlx_jP4MpxqWUy0YEUYKI725VMUr5jKNymtVj0eyr112614DELiHM0GqZMkH/exec")
.then(res=>res.json())
.then(data=>{

  const mpGroups = {};
  const teknisiGroups = {};
  const spvGroups = {};

  // =========================
  // GROUPING
  // =========================
  data.features.forEach(f=>{
    const mp = f.properties["NAMA MP"];
    const teknisi = f.properties["NAMA TEKNISI"];
    const spv = f.properties["NAMA SUPERVISOR M&R"];

    // MP
    if(!mpGroups[mp]) mpGroups[mp]=[];
    mpGroups[mp].push(f);

    // Teknisi (skip VACANT)
    if(teknisi && teknisi!=="VACANT"){
      if(!teknisiGroups[teknisi]) teknisiGroups[teknisi]=[];
      teknisiGroups[teknisi].push(f);
    }

    // SPV (skip VACANT)
    if(spv && spv!=="VACANT"){
      if(!spvGroups[spv]) spvGroups[spv]=[];
      spvGroups[spv].push(f);
    }
  });

  // =========================
  // MP (POINT)
  // =========================
  const mpChildren = [];

  Object.keys(mpGroups).forEach(mp=>{

    const layer = L.geoJSON(mpGroups[mp],{
      pointToLayer:(f,latlng)=>{
        return L.circleMarker(latlng,{
          radius:8,
          fillColor:getColor(mp),
          color:"#000",
          weight:1,
          fillOpacity:0.85
        });
      },
      onEachFeature:(f,l)=>{
        l.bindPopup(`
          <b>${f.properties["NAMA STORE"]}</b><br>
          MP: ${f.properties["NAMA MP"]}<br>
          Teknisi: ${f.properties["NAMA TEKNISI"]}<br>
          SPV: ${f.properties["NAMA SUPERVISOR M&R"]}
        `);
      }
    });

    layer.addTo(map);

    mpChildren.push({
      label: mp,
      layer: layer
    });

  });

  // =========================
  // TEKNISI POLYGON
  // =========================
  const teknisiChildren = [];

  Object.keys(teknisiGroups).forEach(t=>{

    if(teknisiGroups[t].length<3) return;

    const hull = turf.convex({
      type:"FeatureCollection",
      features:teknisiGroups[t]
    });

    if(!hull) return;

    const layer = L.geoJSON(hull,{
      interactive:false,
      style:{
        color:"#ff6600",
        fillColor:"#ffcc99",
        fillOpacity:0.25
      }
    });

    layer.addTo(map);

    teknisiChildren.push({
      label: t,
      layer: layer
    });

  });

  // =========================
  // SPV POLYGON
  // =========================
  const spvChildren = [];

  Object.keys(spvGroups).forEach(s=>{

    if(spvGroups[s].length<3) return;

    const hull = turf.convex({
      type:"FeatureCollection",
      features:spvGroups[s]
    });

    if(!hull) return;

    const layer = L.geoJSON(hull,{
      interactive:false,
      style:{
        color:"#333",
        fillColor:"#999",
        fillOpacity:0.2
      }
    });

    layer.addTo(map);

    spvChildren.push({
      label: s,
      layer: layer
    });

  });

  // =========================
  // TREE CONTROL
  // =========================
  const tree = {
    label: "Layer Control",
    children: [

      {
        label: "MP",
        selectAllCheckbox: true,
        children: mpChildren
      },

      {
        label: "Area Teknisi",
        selectAllCheckbox: true,
        children: teknisiChildren
      },

      {
        label: "Area SPV",
        selectAllCheckbox: true,
        children: spvChildren
      }

    ]
  };

  L.control.layers.tree(null, tree, {
    collapsed: false
  }).addTo(map);

});

</script>

</body>
</html>
