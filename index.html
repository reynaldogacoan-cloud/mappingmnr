<!DOCTYPE html>
<html>
<head>
  <title>Mapping MNR</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #title {
      padding: 12px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      background: #2c3e50;
      color: white;
    }

    #map {
      height: calc(100vh - 50px);
    }
  </style>
</head>
<body>

<div id="title">Mapping MNR</div>
<div id="map"></div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Turf.js (untuk polygon) -->
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script>

  // =========================
  // INIT MAP
  // =========================
  var map = L.map('map').setView([-7.8, 112.0], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // =========================
  // COLOR MP
  // =========================
  const mpColors = {};

  function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 75%, 50%)`;
  }

  function getColor(mp) {
    if (!mp || mp === "VACANT") return "black";
    if (!mpColors[mp]) mpColors[mp] = stringToColor(mp);
    return mpColors[mp];
  }

  // =========================
  // LOAD DATA
  // =========================
  fetch("https://script.google.com/macros/s/AKfycbzjGd2pLlx_jP4MpxqWUy0YEUYKI725VMUr5jKNymtVj0eyr112614DELiHM0GqZMkH/exec")
    .then(res => res.json())
    .then(data => {

      // =========================
      // 1. TAMPILKAN TITIK
      // =========================
      const pointLayer = L.geoJSON(data, {
        pointToLayer: function(feature, latlng) {
          return L.circleMarker(latlng, {
            radius: 8,
            fillColor: getColor(feature.properties["NAMA MP"]),
            color: "#000",
            weight: 1,
            fillOpacity: 0.85
          });
        },
        onEachFeature: function(feature, layer) {
          layer.bindPopup(`
            <b>${feature.properties["NAMA STORE"]}</b><br>
            SPV: ${feature.properties["NAMA SUPERVISOR M&R"]}<br>
            MP: ${feature.properties["NAMA MP"]}
          `);
        }
      }).addTo(map);


      // =========================
      // 2. GROUP BY SPV
      // =========================
      const spvGroups = {};

      data.features.forEach(f => {
        const spv = f.properties["NAMA SUPERVISOR M&R"];
        if (!spvGroups[spv]) spvGroups[spv] = [];
        spvGroups[spv].push(f);
      });


      // =========================
      // 3. BUAT POLYGON (CONVEX HULL)
      // =========================
      Object.keys(spvGroups).forEach(spv => {

        const features = spvGroups[spv];

        if (features.length < 3) return; // minimal 3 titik

        const fc = {
          type: "FeatureCollection",
          features: features
        };

        const hull = turf.convex(fc);

        if (hull) {
          L.geoJSON(hull, {
            style: {
              color: "#333",
              weight: 2,
              fillColor: "#999",
              fillOpacity: 0.2
            }
          })
          .bindPopup("SPV: " + spv)
          .addTo(map);
        }

      });


      // =========================
      // AUTO ZOOM
      // =========================
      map.fitBounds(pointLayer.getBounds());

    });

</script>

</body>
</html>
